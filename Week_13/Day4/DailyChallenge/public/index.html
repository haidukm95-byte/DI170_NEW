<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Guessing Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.25rem; }

    .score-bar {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      color: #aaa;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .emoji-display {
      font-size: 6rem;
      margin: 0.5rem 0 1.5rem;
      line-height: 1;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .option-btn {
      background: #0f3460;
      color: #eee;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.75rem 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .option-btn:hover:not(:disabled) { background: #1a4a7a; }
    .option-btn.correct { background: #1a7a3a; border-color: #2ecc71; }
    .option-btn.wrong   { background: #7a1a1a; border-color: #e74c3c; }
    .option-btn:disabled { cursor: default; }

    .feedback {
      font-size: 1.1rem;
      min-height: 1.8rem;
      margin: 0.25rem 0;
      font-weight: bold;
    }
    .feedback.correct { color: #2ecc71; }
    .feedback.wrong   { color: #e74c3c; }

    .next-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      display: none;
    }
    .next-btn:hover { background: #c73652; }

    .submit-score {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .submit-score input {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
    }

    .submit-score button {
      padding: 0.5rem 1.25rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    #submit-msg { color: #2ecc71; font-size: 0.9rem; }

    .leaderboard {
      margin-top: 2rem;
      width: 100%;
      max-width: 480px;
    }

    .leaderboard h2 { margin-bottom: 0.75rem; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid #0f3460;
    }

    th { background: #0f3460; }
    tr:last-child td { border-bottom: none; }

    #no-scores { text-align: center; color: #aaa; padding: 1rem; font-style: italic; }
  </style>
</head>
<body>

  <h1>Emoji Guesser</h1>
  <div class="score-bar">Score: <span id="score">0</span> &nbsp;|&nbsp; Round: <span id="round">1</span></div>

  <div class="card">
    <div class="emoji-display" id="emoji">...</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">Next Emoji</button>
  </div>

  <div class="submit-score">
    <input type="text" id="player-name" placeholder="Your name" maxlength="20" />
    <button onclick="submitScore()">Submit Score</button>
    <span id="submit-msg"></span>
  </div>

  <div class="leaderboard">
    <h2>Leaderboard</h2>
    <table>
      <thead>
        <tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="4" id="no-scores">No scores yet</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let score = 0;
    let round = 1;
    let currentAnswer = '';
    let answered = false;

    async function loadQuestion() {
      answered = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('emoji').textContent = '...';

      const res = await fetch('/api/question');
      const data = await res.json();

      currentAnswer = data.correctName;
      document.getElementById('emoji').textContent = data.emoji;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      data.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.type = 'button';
        btn.onclick = () => submitGuess(opt, btn);
        optionsDiv.appendChild(btn);
      });
    }

    async function submitGuess(guess, clickedBtn) {
      if (answered) return;
      answered = true;

      const res = await fetch('/api/guess', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guess, correctName: currentAnswer }),
      });
      const data = await res.json();

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === data.correctName) btn.classList.add('correct');
      });

      const feedback = document.getElementById('feedback');
      if (data.correct) {
        score++;
        feedback.textContent = 'Correct!';
        feedback.className = 'feedback correct';
      } else {
        clickedBtn.classList.add('wrong');
        feedback.textContent = `Wrong! It was "${data.correctName}"`;
        feedback.className = 'feedback wrong';
      }

      document.getElementById('score').textContent = score;
      document.getElementById('next-btn').style.display = 'inline-block';
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      round++;
      document.getElementById('round').textContent = round;
      loadQuestion();
    });

    async function submitScore() {
      const name = document.getElementById('player-name').value.trim();
      if (!name) { alert('Enter your name first!'); return; }

      await fetch('/api/leaderboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, score }),
      });

      document.getElementById('submit-msg').textContent = 'Score submitted!';
      setTimeout(() => document.getElementById('submit-msg').textContent = '', 3000);
      loadLeaderboard();
    }

    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      const tbody = document.getElementById('leaderboard-body');

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" id="no-scores">No scores yet</td></tr>';
      } else {
        tbody.innerHTML = data.map((entry, i) =>
          `<tr><td>${i + 1}</td><td>${entry.name}</td><td>${entry.score}</td><td>${entry.date}</td></tr>`
        ).join('');
      }
    }

    loadQuestion();
    loadLeaderboard();
  </script>

</body>
</html>
