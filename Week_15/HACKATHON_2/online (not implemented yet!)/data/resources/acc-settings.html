<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="acc-settings.css" />
    <title>Account settings - To-Do list</title>
  </head>
  <body>
    <div id="wrapper">
      <form id="acc-set-form">
        <h1>Account settings</h1>
        <h2>You have logged in as <b></b></h2>
        <label for="email">Your email: <b></b></label><br />
        <input
          type="text"
          id="email"
          name="email"
          placeholder="change email"
        /><br />
        <input
          type="submit"
          id="submitEmailChanges"
          value="Change email"
        /><br />

        <label for="username">Your username: <b></b></label><br />
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Change your username"
        /><br />
        <input
          type="submit"
          id="submitUsernameChanges"
          value="Change username"
        /><br />

        <label for="password">Change your password</label><br />
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Current password"
        /><br />
        <input
          type="password"
          id="new-password"
          name="new-password"
          placeholder="New password"
        /><br />
        <input
          type="password"
          id="new-password-confirm"
          name="new-password-confirm"
          placeholder="Confirm new password"
        /><br />
        <input
          type="submit"
          id="submitPassChanges"
          value="Change password"
        /><br />

        <a href="main.html">Back to tasks menu</a><br />
        <a href="#" id="accountDelete">Delete account</a>
      </form>
    </div>

    <div
      id="delete-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      "
    >
      <div
        style="
          background: #fff;
          margin: 15% auto;
          padding: 24px;
          width: 320px;
          border-radius: 8px;
        "
      >
        <p><b>Are you sure? All your data will be lost!</b></p>
        <label for="delete-password">Enter your password to confirm:</label
        ><br />
        <input
          type="password"
          id="delete-password"
          style="width: 100%; margin: 8px 0"
        /><br />
        <p id="delete-error" style="color: red; display: none"></p>
        <button id="delete-confirm">Yes, delete my account</button>
        <button id="delete-cancel">Cancel</button>
      </div>
    </div>

    <script type="text/javascript" src="acc-settings.js"></script>
  </body>
</html>
