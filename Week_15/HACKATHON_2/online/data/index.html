<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - To-Do list</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    
  </head>
  <body>
    <header>
      <h1>TO-DO LIST</h1>
    </header>
    <div id="wrapper">
      <form id="login-form">
        <h3>Welcome back!</h3>
        <h4>Sign in to your account</h3>
        <label for="username">Your username or email</label><br />
        <input type="text" id="username" name="username" /><br />
        <label for="password">Your password</label><br />
        <input type="password" id="password" name="password" /><br />
        <input type="submit" value="Log in" id="loginButton">
        <input type="checkbox" id="show-password" name="show-password" value="Show password">
        <label for="show-password">Show password<br />
        <p>Don`t have an account? <a id="sing-up" href="resources/signup.html">Sign up</a></p>
      </form>
    </div>

    <script type="text/javascript" src="script.js"></script>

  </body>
</html>
