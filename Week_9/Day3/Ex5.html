<html>
    <body>
        <script type="text/javascript">
           // Use the reduce() method to sum up all the calories of every 
           // desert, except Apple Pie.
            //The output should be 85
        let party = [
            {
            desert: 'Chocolate Mousse',
            calories: 30,
            },
            {
            desert: 'Apple Pie',
            calories: 15,
            },
            {
            desert: 'Croissant',
            calories: 50,
            },
            {
            desert: 'Strawberry Icecream',
            calories: 5,
            },
        ]
            let cals = party.reduce((acc, desert) => {
                if (desert.desert !== 'Apple Pie') {
                    return acc + desert.calories;
                }
                return acc;
            }, 0);

            console.log(cals); // 85
            
        </script>
    </body>
</html>
