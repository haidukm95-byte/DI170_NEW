        <script>
            //Exercise 1 : Nested functions
    //Using the code below, and before executing it, predict the outcome and explain 
    // how you came to this conclusion.
    //ANSWER:
    // 1. flat defines _ no more times than x
    //2. mountain defines / once , then ' no more times than x stated and after \\ once
    //3. flat(x) is 4; mountain (x) is 4; flat(x) is 4
    //Expected output: ____/''''\\____

    //Change the code below to nested arrow functions. (upd: has been changed)

            let landscape = ()=> {

            let result = "";

            let flat = (x)=> {
                for(let count = 0; count<x; count++){
                    result = result + "_";
                }
            }

            let mountain = (x)=> {
                result = result + "/"
                for(let counter = 0; counter<x; counter++){
                    result = result + "'"
                }
                result = result + "\\"
            }
        
        flat(4);
        mountain(4);
        flat(4)

        return result;
    }

console.log(landscape())
